name: Ping
options:
  bundleIdPrefix: com.v1
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"
  Inject:
    url: https://github.com/krzysztofzablocki/Inject
    from: "1.5.2"

targets:
  Ping:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Ping
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Ping/Assets.xcassets
      - path: Ping/Info.plist
      - path: Ping/GoogleService-Info.plist
    info:
      path: Ping/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        GOOGLE_CLIENT_ID: $(GOOGLE_CLIENT_ID)
        CFBundleURLTypes:
          - CFBundleURLName: google-signin
            CFBundleURLSchemes:
              - com.googleusercontent.apps.800250483447-f5gd7tka69i15qp1ohfljd728h74295p
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.v1.ping
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: "B5ZA7KN3V5"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Ping/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: Inject
        product: Inject
    entitlements:
      path: Ping/Ping.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.v1.ping

  PingShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PingShareExtension
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
    info:
      path: PingShareExtension/Info.plist
      properties:
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.v1.ping.ShareExtension
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        INFOPLIST_FILE: PingShareExtension/Info.plist
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: PingShareExtension/PingShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.v1.ping
